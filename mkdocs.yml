site_name: Jupycat
site_description: cat for Jupyter notebooks
site_url: https://ebin7joseph.github.io/jupycat/
repo_url: https://github.com/ebin7joseph/jupycat

theme:
  name: material
  logo: assets/jupycat-dark.png
  favicon: assets/jupycat-dark.png
  features:
    - content.code.copy
  palette:
    - scheme: default
      primary: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

nav:
  - Home: index.md
  - Usage: usage.md
  - AI Agents: ai-agents.md
  - Example Configs: agents.md
  - Contributing: contributing.md
